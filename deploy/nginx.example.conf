# Ejemplo para VPS: ajusta server_name, rutas y socket PHP-FPM.
# Tras `npm run build:deploy`, sube el contenido de /dist a $root.

server {
    listen 80;
    listen [::]:80;
    server_name tu-dominio.com;

    # Raíz = salida de Vite + carpeta api/ (build:deploy)
    root /var/www/sjelectronics/dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # PHP del proxy WordPress (misma carpeta que el front)
    location ~ ^/api/.+\.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Debian/Ubuntu típico:
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        # fastcgi_pass 127.0.0.1:9000;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
